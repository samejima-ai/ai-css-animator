# 情報代謝 処理済みマーカー（reindex が前進させる。手動編集は非推奨）
#
# これは「機械カーソル」であり、reindex 処理が §3 step7 でのみ前進させる。
# 人間が決める設定値（token_budget 等）は history/.metabolism-config.yml に責務分離されている。
# このファイルと config を混同しないこと（Council mcfg01 の責務分離要請）。
#
# checksum の対象は「先頭〜line までの消化済みプレフィックスのみ」（reindex-protocol.md §2 M2）。
# 値は **フル 64hex の sha256**（短縮しない・前方一致でなく全長一致で比較する）。
# 本 baseline 生成時は line=現末尾 のため「消化済みプレフィックス」=全文 = 現内容の sha256。
# 末尾への正常な append では指紋は変わらない。プレフィックス指紋が不一致なら cursor 以前の改変を意味する。

last_reindex_at: "2026-06-07T05:00:00Z"   # 最終 reindex（本番第二弾 mtb2sc）の cycle 境界時刻。baseline は足回り整備①(03:40Z)で生成

reduction_target: DH                       # この cursor が DH 還元の消化進捗であることを明示（軸A・config と無引用で統一）

dry_run_remaining: 3                        # 残り Dry-run サイクル数（config.metabolism.dry_run_cycles の初期値から減算）
                                            # 0 で本番昇格。負値/破損検出時は安全側へ倒し Dry-run 強制（L1）

